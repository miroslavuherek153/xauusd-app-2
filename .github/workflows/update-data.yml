name: Update XAUUSD data

on:
  schedule:
    - cron: "*/15 * * * *"  # každých 15 minut
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas yfinance ta

      - name: Run data updater
        env:
          GOLDAPI_KEY: ${{ secrets.GOLDAPI_KEY }}
        run: |
          python scripts/update_data.py

      - name: Commit and push changes
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [[ -n "$(git status --porcelain)" ]]; then
            PRICE=$(jq -r '.price' data.json)
            SIGNAL=$(jq -r '.signal' data.json)
            UPDATED=$(jq -r '.updated' data.json)

            git add data.json
            git commit -m "Auto: XAUUSD ${PRICE} ${SIGNAL} ${UPDATED}"
            git push
          else
            echo "No changes to commit."
          fi
