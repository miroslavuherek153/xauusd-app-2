<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD Live Terminal</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: #161b22;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h1 { font-size: 1.5rem; text-align: center; color: #58a6ff; }
        .widget-wrapper { margin-top: 20px; border-radius: 8px; overflow: hidden; }
    </style>
</head>
<body>

<div class="container">
    <h1>XAUUSD Real-Time Terminal</h1>
    
    <!-- LIVE CENA (JEDNODUCHÝ WIDGET) -->
    <div class="widget-wrapper" style="height: 100px;">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
            {
                "symbol": "OANDA:XAUUSD",
                "width": "100%",
                "colorTheme": "dark",
                "isTransparent": true,
                "locale": "cs"
            }
            </script>
        </div>
    </div>

    <!-- LIVE GRAF (S MOŽNOSTÍ TRADINGU) -->
    <div class="widget-wrapper" style="height: 500px;">
        <div class="tradingview-widget-container" style="height:100%;width:100%">
            <div id="tradingview_chart" style="height:calc(100% - 32px);width:100%"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
            new TradingView.widget({
                "autosize": true,
                "symbol": "OANDA:XAUUSD",
                "interval": "1",
                "timezone": "Europe/Prague",
                "theme": "dark",
                "style": "1",
                "locale": "cs",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "container_id": "tradingview_chart"
            });
            </script>
        </div>
    </div>
</div>

</body>
</html>
