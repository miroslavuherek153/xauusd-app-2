<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD H1 MASTER STRATEGY</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 10px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .container { width: 100%; max-width: 900px; background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; box-sizing: border-box; }
        .header { text-align: center; border-bottom: 1px solid #30363d; padding-bottom: 15px; margin-bottom: 20px; }
        h1 { color: #58a6ff; margin: 0; font-size: 1.6rem; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        @media (max-width: 600px) { .info-grid { grid-template-columns: 1fr; } }
        .info-box { background: #21262d; padding: 15px; border-radius: 8px; border: 1px solid #30363d; }
        .label { color: #8b949e; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .trade-value { font-family: 'Courier New', monospace; color: #ffffff; font-size: 1.3rem; font-weight: bold; background: #0d1117; padding: 5px 10px; border-radius: 4px; display: block; margin: 5px 0; }
        .buy-theme { border-left: 5px solid #3fb950; }
        .sell-theme { border-left: 5px solid #f85149; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>XAUUSD H1 STRATEGY TERMINAL</h1>
        <p style="color: #8b949e; margin: 5px 0 0 0;">Dle strategie: SL 4.5b | TP 2.0b | VWAP Filter</p>
    </div>

    <div style="height: 450px; border-radius: 8px; overflow: hidden; border: 1px solid #30363d; margin-bottom: 20px;">
        <div id="tradingview_chart" style="height:100%;"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script type="text/javascript">
        new TradingView.widget({
            "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "60", "timezone": "Europe/Prague",
            "theme": "dark", "style": "1", "locale": "cs", "container_id": "tradingview_chart",
            "studies": ["VWAP@tv-basicstudies"]
        });
        </script>
    </div>

    <div class="info-grid">
        <div class="info-box">
            <span class="label">Technický Sentiment (H1)</span>
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                { "interval": "1h", "width": "100%", "isTransparent": true, "height": 300, "symbol": "OANDA:XAUUSD", "showIntervalTabs": false, "locale": "cs", "colorTheme": "dark" }
                </script>
            </div>
        </div>

        <div class="info-box" id="trade-panel">
            <span class="label" id="setup-label">Kontroluji trh...</span>
            <h2 id="setup-title" style="margin: 10px 0;">Čekám na H1 svíci</h2>
            
            <div style="margin-top: 15px;">
                <span class="label">Entry (Vstup pod/nad Low/High)</span>
                <span class="trade-value" id="val-entry">-</span>
                
                <span class="label">Stop Loss (Fix 4.5 bodu)</span>
                <span class="trade-value" id="val-sl" style="color: #f85149;">-</span>
                
                <span class="label">Take Profit (Fix 2.0 body)</span>
                <span class="trade-value" id="val-tp" style="color: #3fb950;">-</span>
            </div>

            <p id="vwap-info" style="font-size: 0.8rem; color: #8b949e; margin-top: 15px; border-top: 1px solid #30363d; padding-top: 10px;">
                Pravidlo: Obchoduj pouze od 07:00 ráno.
            </p>
        </div>
    </div>
</div>

<script>
    async function updateStrategy() {
        try {
            // Získání poslední uzavřené H1 svíčky z Binance (PAXG = Zlato)
            const res = await fetch('https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=1h&limit=2');
            const data = await res.json();
            const lastCandle = data[0]; // Předchozí uzavřená svíce
            const currentPrice = parseFloat(data[1][4]); // Aktuální cena

            const highH1 = parseFloat(lastCandle[2]);
            const lowH1 = parseFloat(lastCandle[3]);
            const openH1 = parseFloat(lastCandle[1]);

            const panel = document.getElementById('trade-panel');
            const spread = 0.30; // Simulovaný spread 30 bodů
            
            // Logika VWAP / Trendu: Cena vs. Open H1
            if (currentPrice < openH1) {
                // SHORT SETUP (Cena pod open/vwap)
                panel.className = "info-box sell-theme";
                document.getElementById('setup-label').innerText = "Vstup pod Low H1";
                document.getElementById('setup-title').innerText = "▼ SHORT SETUP";
                
                const entry = (lowH1 - spread).toFixed(2);
                document.getElementById('val-entry').innerText = entry;
                document.getElementById('val-sl').innerText = (parseFloat(entry) + 4.5).toFixed(2);
                document.getElementById('val-tp').innerText = (parseFloat(entry) - 2.0).toFixed(2);
                document.getElementById('vwap-info').innerText = "Podmínka: Cena pod VWAP. Cílíme na 2 body dolů.";
            } else {
                // LONG SETUP (Cena nad open/vwap)
                panel.className = "info-box buy-theme";
                document.getElementById('setup-label').innerText = "Vstup nad High H1";
                document.getElementById('setup-title').innerText = "▲ LONG SETUP";
                
                const entry = (highH1 + spread).toFixed(2);
                document.getElementById('val-entry').innerText = entry;
                document.getElementById('val-sl').innerText = (parseFloat(entry) - 4.5).toFixed(2);
                document.getElementById('val-tp').innerText = (parseFloat(entry) + 2.0).toFixed(2);
                document.getElementById('vwap-info').innerText = "Podmínka: Cena nad VWAP. Cílíme na 2 body nahoru.";
            }

        } catch (e) { console.log("Sync error..."); }
    }

    setInterval(updateStrategy, 5000);
    updateStrategy();
</script>

</body>
</html>
