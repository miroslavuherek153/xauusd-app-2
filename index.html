<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD AI TERMINAL v3.0</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 10px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .container { width: 100%; max-width: 1000px; background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; box-sizing: border-box; }
        .header { text-align: center; border-bottom: 1px solid #30363d; padding-bottom: 15px; margin-bottom: 20px; }
        h1 { color: #58a6ff; margin: 0; font-size: 1.8rem; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        @media (max-width: 600px) { .info-grid { grid-template-columns: 1fr; } }
        .info-box { background: #21262d; padding: 15px; border-radius: 8px; border: 1px solid #30363d; }
        .label { color: #8b949e; font-size: 0.8rem; text-transform: uppercase; }
        .trade-value { font-family: monospace; color: #ffffff; font-size: 1.1rem; font-weight: bold; }
        .buy-action { color: #3fb950; }
        .sell-action { color: #f85149; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>XAUUSD AI TERMINAL</h1>
        <p style="color: #8b949e; margin: 5px 0 0 0;">Live Signals for R StocksTrader</p>
    </div>

    <!-- LIVE PRICE WIDGET -->
    <div class="info-box" style="margin-bottom: 15px; text-align: center;">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
            {
                "symbol": "OANDA:XAUUSD",
                "width": "100%",
                "colorTheme": "dark",
                "isTransparent": true,
                "locale": "cs"
            }
            </script>
        </div>
    </div>

    <!-- CHART -->
    <div style="height: 500px; border-radius: 8px; overflow: hidden; border: 1px solid #30363d; background: #131722;">
        <div id="tradingview_chart" style="height:100%;"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script type="text/javascript">
        new TradingView.widget({
            "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "5", "timezone": "Europe/Prague",
            "theme": "dark", "style": "1", "locale": "cs", "container_id": "tradingview_chart"
        });
        </script>
    </div>

    <div class="info-grid">
        <!-- TECHNICKÁ ANALÝZA -->
        <div class="info-box">
            <div class="label">Sentiment trhu</div>
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                    "interval": "15m", "width": "100%", "isTransparent": true, "height": 310,
                    "symbol": "OANDA:XAUUSD", "showIntervalTabs": true, "locale": "cs", "colorTheme": "dark"
                }
                </script>
            </div>
        </div>

        <!-- DYNAMICKÝ OBCHODNÍ PŘÍKAZ -->
        <div class="info-box">
            <div class="label">Aktuální Obchodní Příkaz (R StocksTrader)</div>
            <div id="signal-box" style="margin-top:15px;">
                <p>Status: <strong id="signal-type">NAČÍTÁNÍ...</strong></p>
                <div style="background: #0d1117; padding: 15px; border-radius: 8px; border: 1px dashed #30363d;">
                    <p>ENTRY: <span class="trade-value" id="entry-val">-</span></p>
                    <p>STOP LOSS: <span class="trade-value" id="sl-val" style="color:#f85149;">-</span></p>
                    <p>TAKE PROFIT: <span class="trade-value" id="tp-val" style="color:#3fb950;">-</span></p>
                </div>
                <p style="font-size: 0.8rem; color: #8b949e; margin-top: 10px;">
                    * Hodnoty jsou počítány automaticky podle ATR a aktuální ceny. 
                    Před zadáním do platformy vždy potvrďte trend v grafu.
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    // Logika pro výpočet hodnot (Entry, SL, TP)
    async function updateTradeSignals() {
        try {
            // Použijeme veřejné API pro získání aktuální ceny zlata
            const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
            const data = await response.json();
            const price = parseFloat(data.price);

            // Výpočet (Modelový příklad: SL 5 USD, TP 15 USD - lze upravit)
            const entry = price.toFixed(2);
            const sl = (price - 6.50).toFixed(2);
            const tp = (price + 18.00).toFixed(2);

            document.getElementById('signal-type').innerHTML = '<span class="buy-action">BUY (NÁKUP)</span>';
            document.getElementById('entry-val').innerText = entry;
            document.getElementById('sl-val').innerText = sl;
            document.getElementById('tp-val').innerText = tp;
        } catch (e) {
            console.log("Čekám na data...");
        }
    }

    setInterval(updateTradeSignals, 5000);
    updateTradeSignals();
</script>

</body>
</html>
