<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>XAUUSD Trading Console</title>
  <style>
    :root{
      --bg:#0f1720;--card:#0b1220;--muted:#9aa6b2;--green:#00d084;--red:#ff6b6b;
      --accent:#1f2937; font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;
    }
    body{margin:0;background:linear-gradient(180deg,#071021 0%, #071827 100%);color:#e6eef6}
    .wrap{max-width:1100px;margin:18px auto;padding:18px}
    .header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .logo{width:48px;height:48px;border-radius:8px;background:linear-gradient(135deg,#0ea5a4,#06b6d4)}
    h1{font-size:18px;margin:0}
    .grid{display:grid;grid-template-columns:2fr 1fr;gap:12px}
    .card{background:var(--card);padding:12px;border-radius:8px;box-shadow:0 6px 18px rgba(2,6,23,0.6)}
    canvas{width:100%;height:360px;background:linear-gradient(180deg,#071827,#021018);border-radius:6px}
    .finput{display:flex;flex-direction:column;margin-bottom:8px}
    .finput label{font-size:12px;color:var(--muted);margin-bottom:6px}
    select,input{padding:8px;border-radius:6px;border:1px solid #1f2a36;background:#071827;color:#e6eef6}
    .rbtn{padding:10px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.04);background:#0b1220;color:#e6eef6;cursor:pointer}
    .rbtn:hover{opacity:0.95}
    .muted{color:var(--muted);font-size:13px}
    .small{font-size:12px;color:var(--muted)}
    .ctitle{font-weight:600;margin-bottom:8px}
    .footer{margin-top:12px;color:var(--muted);font-size:13px}
    @media(max-width:900px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="logo"></div>
      <div>
        <h1>XAUUSD Trading Console</h1>
        <div class="small">Technická analýza a rychlé zadávání obchodů s TP a SL</div>
      </div>
    </div>

    <div class="grid">
      <!-- Graf a indikátory -->
      <div class="card">
        <div class="ctitle">Graf XAUUSD</div>
        <canvas id="chartCanvas"></canvas>
        <div style="display:flex;gap:8px;margin-top:10px;align-items:center">
          <div class="small">Timeframe</div>
          <select id="tfSelect" onchange="renderDummyChart()">
            <option value="M5">M5</option>
            <option value="M15" selected>M15</option>
            <option value="H1">H1</option>
            <option value="H4">H4</option>
          </select>
          <div style="flex:1"></div>
          <div class="small">Indicators</div>
          <label style="margin-left:8px"><input id="showMA" type="checkbox" checked onchange="renderDummyChart()"> MA</label>
          <label style="margin-left:8px"><input id="showRSI" type="checkbox" onchange="renderDummyChart()"> RSI</label>
        </div>
      </div>

      <!-- Obchodní panel -->
      <div class="card" id="rstraderPanel">
        <div class="ctitle">Obchodní konzole</div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
          <div class="finput">
            <label>Směr</label>
            <select id="trade_side">
              <option value="BUY">BUY</option>
              <option value="SELL">SELL</option>
            </select>
          </div>

          <div class="finput">
            <label>Typ vstupu</label>
            <select id="trade_type" onchange="onEntryTypeChange()">
              <option value="MARKET">Market</option>
              <option value="LIMIT">Limit</option>
              <option value="STOP">Stop</option>
            </select>
          </div>

          <div class="finput">
            <label>Vstupní cena</label>
            <input id="trade_entryPrice" type="number" step="0.01" placeholder="auto (market)">
          </div>

          <div class="finput">
            <label>Stop Loss cena</label>
            <input id="trade_slPrice" type="number" step="0.01" placeholder="např. 2460.00">
          </div>

          <div class="finput">
            <label>Take Profit cena</label>
            <input id="trade_tpPrice" type="number" step="0.01" placeholder="např. 2490.00">
          </div>

          <div class="finput">
            <label>Risk procento účtu</label>
            <input id="trade_riskPercent" type="number" step="0.1" value="1.0" placeholder="1.0">
          </div>

          <div class="finput">
            <label>USD za 1 lot za 1 USD pohybu</label>
            <input id="trade_usdPerLot" type="number" step="0.01" value="1" placeholder="broker-specific">
          </div>

          <div class="finput">
            <label>Velikost pozice (loty)</label>
            <input id="trade_lots" type="text" readonly placeholder="vypočítáno">
          </div>
        </div>

        <div style="display:flex;gap:8px;">
          <button class="rbtn" onclick="previewCalc()">Spočítat loty</button>
          <button class="rbtn" onclick="sendOrder()" style="background:linear-gradient(135deg,rgba(0,255,136,0.08),rgba(0,255,136,0.02));border-color:rgba(0,255,136,0.15);color:var(--green);">ODESLAT OBCHOD</button>
        </div>

        <div id="trade_feedback" style="margin-top:10px;font-size:13px;color:var(--muted)"></div>
        <div class="footer">Poznámka: Backend endpointy <code>/account</code> a <code>/order</code> musí být nasazeny samostatně.</div>
      </div>
    </div>
  </div>

  <script>
    // ---------- Dummy chart data and rendering ----------
    let cachedData = { price: 2465.00 }; // fallback poslední cena
    function renderDummyChart(){
      const canvas = document.getElementById('chartCanvas');
      const ctx = canvas.getContext('2d');
      canvas.width = canvas.clientWidth;
      canvas.height = canvas.clientHeight;
      // jednoduchý gradient background
      const g = ctx.createLinearGradient(0,0,0,canvas.height);
      g.addColorStop(0,'#071827'); g.addColorStop(1,'#021018');
      ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width,canvas.height);

      // vykreslíme jednoduchou "svíčkovou" náhodnou sérii pro vizuál
      const bars = 60;
      const w = canvas.width / bars;
      let base = canvas.height/2;
      ctx.strokeStyle = '#2dd4bf'; ctx.lineWidth = 1.2;
      for(let i=0;i<bars;i++){
        const h = Math.sin(i/6 + Date.now()/4000)*30 + (Math.random()*20-10);
        const x = i*w + 6;
        ctx.beginPath();
        ctx.moveTo(x, base);
        ctx.lineTo(x, base - h);
        ctx.stroke();
      }

      // price label
      ctx.fillStyle = '#9aa6b2';
      ctx.font = '14px Inter, Arial';
      ctx.fillText('Last price: ' + cachedData.price.toFixed(2), 12, 20);
    }
    renderDummyChart();
    setInterval(renderDummyChart, 4000);

    // ---------- Entry type control ----------
    function onEntryTypeChange(){
      const t = document.getElementById('trade_type').value;
      const entry = document.getElementById('trade_entryPrice');
      entry.disabled = (t === 'MARKET');
      if(t === 'MARKET') entry.value = '';
    }

    // ---------- Lot size calculation ----------
    function calcLotSize(accountBalanceUSD, riskPercent, entryPrice, slPrice, usdPerLot=1){
      const riskUSD = accountBalanceUSD * (riskPercent / 100);
      const slDistance = Math.abs(entryPrice - slPrice);
      if(slDistance <= 0 || usdPerLot <= 0) return 0;
      const lossPerLot = slDistance * usdPerLot;
      const lots = riskUSD / lossPerLot;
      // zaokrouhlení podle běžného kroku brokera, tady 0.01 lotu
      const step = 0.01;
      const rounded = Math.floor(lots / step) * step;
      return Math.max(0, Number(rounded.toFixed(2)));
    }

    // ---------- Preview calculation ----------
    async function previewCalc(){
      const feedback = document.getElementById('trade_feedback');
      feedback.textContent = 'Počítám...';

      const type = document.getElementById('trade_type').value;
      const entryPriceInput = parseFloat(document.getElementById('trade_entryPrice').value) || 0;
      const slPrice = parseFloat(document.getElementById('trade_slPrice').value) || 0;
      const riskPercent = parseFloat(document.getElementById('trade_riskPercent').value) || 1;
      const usdPerLot = parseFloat(document.getElementById('trade_usdPerLot').value) || 1;

      // získat balance z backend
      let accountBalance = 1000;
      try{
        const r = await fetch('/account');
        if(r.ok){
          const j = await r.json();
          if(j && j.balance) accountBalance = Number(j.balance);
        }
      }catch(e){
        // fallback
      }

      let entry = entryPriceInput;
      if(type === 'MARKET' && (!entry || entry === 0)){
        entry = cachedData.price;
      }

      if(!entry || !slPrice){
        feedback.textContent = 'Zadej vstupní cenu a SL pro výpočet.';
        return;
      }

      const lots = calcLotSize(accountBalance, riskPercent, entry, slPrice, usdPerLot);
      document.getElementById('trade_lots').value = lots;
      feedback.innerHTML = `<strong class="small">Risk</strong>: $${(accountBalance*(riskPercent/100)).toFixed(2)} · <strong class="small">Loty</strong>: ${lots}`;
    }

    // ---------- Prepare payload ----------
    function prepareOrderPayload(){
      const side = document.getElementById('trade_side').value;
      const type = document.getElementById('trade_type').value;
      const entryPrice = parseFloat(document.getElementById('trade_entryPrice').value) || null;
      const slPrice = parseFloat(document.getElementById('trade_slPrice').value) || null;
      const tpPrice = parseFloat(document.getElementById('trade_tpPrice').value) || null;
      const riskPercent = parseFloat(document.getElementById('trade_riskPercent').value) || 1;
      const usdPerLot = parseFloat(document.getElementById('trade_usdPerLot').value) || 1;
      const lots = parseFloat(document.getElementById('trade_lots').value) || null;

      return {
        symbol: 'XAUUSD',
        side,
        type,
        entryPrice,
        slPrice,
        tpPrice,
        riskPercent,
        usdPerLot,
        lots
      };
    }

    // ---------- Send order to backend ----------
    async function sendOrder(){
      const fb = document.getElementById('trade_feedback');
      fb.textContent = 'Odesílám příkaz...';

      if(!document.getElementById('trade_lots').value){
        await previewCalc();
      }

      const payload = prepareOrderPayload();

      if(!payload.slPrice || !payload.tpPrice){
        fb.textContent = 'Zadej SL a TP před odesláním.';
        return;
      }
      if(!payload.lots || payload.lots <= 0){
        fb.textContent = 'Velikost pozice je 0. Zkontroluj SL a risk.';
        return;
      }

      try{
        const res = await fetch('/order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if(!res.ok){
          const txt = await res.text();
          fb.innerHTML = `<span style="color:var(--red)"><strong>Chyba:</strong> ${res.status} ${txt}</span>`;
          return;
        }

        const data = await res.json();
        fb.innerHTML = `<span style="color:var(--green)"><strong>OK:</strong> Příkaz odeslán. ID: ${data.orderId || '—'}</span>`;
      }catch(err){
        fb.innerHTML = `<span style="color:var(--red)"><strong>Chyba:</strong> ${err.message}</span>`;
      }
    }

    // ---------- Optional: load real price periodically (placeholder) ----------
    async function refreshMarketPrice(){
      // Pokud máš backend endpoint, můžeš sem volat reálnou cenu
      // Příklad: const r = await fetch('/price?symbol=XAUUSD');
      // fallback: simulace drobné změny
      cachedData.price = (cachedData.price + (Math.random()-0.5)*0.6);
      setTimeout(refreshMarketPrice, 5000);
    }
    refreshMarketPrice();
  </script>
</body>
</html>
